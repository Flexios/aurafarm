<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AuraFarm">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1210"/>
      <stop offset="55%" stop-color="#0c0b0a"/>
      <stop offset="100%" stop-color="#080706"/>
    </linearGradient>
    <linearGradient id="aura" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#f08a7a"/>
      <stop offset="50%" stop-color="#e85d4c"/>
      <stop offset="100%" stop-color="#c94a3b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#e85d4c" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#e85d4c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e85d4c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Full-bleed background (safe for maskable) -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#glow)"/>
  <!-- Outer aura ring -->
  <circle cx="256" cy="248" r="148" fill="none" stroke="url(#aura)" stroke-width="22" opacity="0.35"/>
  <circle cx="256" cy="248" r="118" fill="none" stroke="url(#aura)" stroke-width="28"/>
  <!-- Inner core -->
  <circle cx="256" cy="248" r="46" fill="url(#aura)"/>
  <circle cx="242" cy="234" r="14" fill="#fff8f0" opacity="0.35"/>
  <!-- Mark slash (brand) -->
  <path d="M196 168 L340 168 L292 328 L148 328 Z" fill="url(#aura)" opacity="0.95"/>
  <path d="M214 186 L318 186 L286 298 L182 298 Z" fill="#140c0a" opacity="0.22"/>
</svg>
